<!-- expand shortcode with better quote handling -->
<div class="expand">
  <button type="button" class="expand-button" onclick="this.nextElementSibling.classList.toggle('expand-hidden')">
    {{ .Get 0 | safeHTML }}
  </button>
  <div class="expand-content expand-hidden">
    {{ .Inner | .Page.RenderString }}
  </div>
</div>

<style>
.expand-button {
  background: #f0f0f0;
  border: 1px solid #ddd;
  padding: 8px 15px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  margin: 10px 0;
  display: inline-block;
}
.expand-button:hover {
  background: #e0e0e0;
}
.expand-content {
  padding: 15px;
  border-left: 3px solid #007acc;
  background: #f9f9f9;
  margin: 10px 0 20px 0;
}
.expand-hidden {
  display: none;
}
</style>
